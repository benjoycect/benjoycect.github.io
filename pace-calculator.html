<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACE — Running Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── BASE ── */
html {
background-color: #141C21;
min-height: 100%;
font-size: 16px;
}
body {
background-color: #141C21;
color: #9db3a0;
font-family: ‘Urbanist’, sans-serif;
font-weight: 400;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}

/* ── BUTTON RESET — critical for Safari iOS ── */
button {
-webkit-appearance: none;
-moz-appearance: none;
appearance: none;
border: none;
background: transparent;
cursor: pointer;
font-family: ‘Urbanist’, sans-serif;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}

/* ── INPUT RESET ── */
input {
-webkit-appearance: none;
-moz-appearance: none;
appearance: none;
border: none;
outline: none;
background: transparent;
font-family: ‘Share Tech Mono’, monospace;
color: #fef0ce;
}
input[type=“number”] { -moz-appearance: textfield; }
input[type=“number”]::-webkit-outer-spin-button,
input[type=“number”]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input::placeholder { color: #2e4a38; }

/* ── LAYOUT ── */
.app {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 48px 24px 80px;
}

/* ── HEADER ── */
.hdr {
display: -webkit-flex;
display: flex;
-webkit-align-items: flex-end;
align-items: flex-end;
-webkit-justify-content: space-between;
justify-content: space-between;
margin-bottom: 40px;
padding-bottom: 20px;
border-bottom: 1px solid rgba(157, 179, 160, 0.12);
opacity: 0;
-webkit-animation: fadeUp 0.7s ease forwards 0.05s;

}
.logo-eye {
font-family: ‘Urbanist’, sans-serif;

font-weight: 600;

.hdr-right {

.pill-btn {

/* ── BACK LINK ───────────────────────────────────────────── */
    .back {
      font-size: 1rem;
      margin-bottom: 40px;
      color: #1991ae;
    }
/* ── MODE TABS ── */
.tabs {
display: -webkit-flex;
display: flex;
border: 1px solid rgba(157, 179, 160, 0.12);
border-bottom: none;
border-radius: 6px 6px 0 0;
overflow: hidden;
opacity: 0;
-webkit-animation: fadeUp 0.7s ease forwards 0.15s;
animation: fadeUp 0.7s ease forwards 0.15s;
background-color: rgba(157, 179, 160, 0.06);
}
.tab {
-webkit-flex: 1;
flex: 1;
padding: 14px 8px;
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
-webkit-align-items: center;
align-items: center;
gap: 5px;

}
.tab:last-child { border-right: none; }
.tab::after {

left: 0;
right: 0;

}

font-size: 10px;

transition: color 0.2s;
}
.tab.on .tab-lbl { color: #fef0ce; }
.tab-eq {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: #6a8a72;
-webkit-transition: color 0.2s;
transition: color 0.2s;
}

/* ── PANEL ── */
.panel {
background-color: #1e2d35;
border: 1px solid rgba(157, 179, 160, 0.12);
border-top: none;

/* ── INPUT GRID ── */
.igrid {
display: -webkit-flex;
display: flex;
-webkit-align-items: flex-start;
align-items: flex-start;

margin-bottom: 28px;
}
.igrp {
-webkit-flex: 1;
flex: 1;
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;

.irow {
display: -webkit-flex;

-webkit-justify-content: space-between;

.ilbl {

/* ── FIELD ── */
.field {
background-color: #0f171c;

}

/* ── NUMBER INPUT ── */
.ni {

/* ── TIME SEGMENTS ── */
.trow {

display: flex;

.ts {

font-size: 28px;
color: #fef0ce;
text-align: center;

border: none;

.ts::-webkit-inner-spin-button { -webkit-appearance: none; }

.tc {
font-family: ‘Share Tech Mono’, monospace;
font-size: 22px;
color: #3a5a42;
padding-bottom: 2px;
-webkit-user-select: none;
user-select: none;

padding-right: 1px;

/* ── INLINE UNIT TOGGLE ── */
.iu {
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
gap: 2px;

padding-left: 10px;

font-size: 10px;
font-weight: 700;
letter-spacing: 0.09em;
color: #4a6a52;
padding: 3px 8px;

.iu-btn.on {

/* ── STATIC UNIT LABEL ── */
.su {

font-size: 11px;
font-weight: 600;
letter-spacing: 0.1em;
color: #4a6a52;
text-transform: uppercase;

/* ── PRESET STRIP ── */
.pstrip {
display: -webkit-flex;
display: flex;
border-top: 1px solid rgba(157, 179, 160, 0.1);
}
.pchip {

font-size: 10px;

color: #fef0ce;

/* ── DIVIDER ARROW ── */
.arr {
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;

width: 1px;

/* ── CALCULATE BUTTON ── */
.cbrow {
display: -webkit-flex;

}

}

.bhdr {
background-color: #0f171c;
padding: 10px 20px;
display: -webkit-flex;
display: flex;

}
.bhdrlbl {

font-size: 9px;

}
.bhdrline {
-webkit-flex: 1;

}
.bgrid {

display: flex;

/* ── SPLITS ── */

/* ── FOOTER ── */
.ftr {

/* ── ANIMATIONS ── */

<body>
<div class="app">

  <!-- HEADER -->

  <header class="hdr">
    <a href="index.html" class="back">← Back to home</a>
    <div class="hdr-right">
      <div class="unit-lbl">Default units</div>
      <div class="pill">
        <button class="pill-btn on" data-u="mi" onclick="setGlobal('mi')">Miles</button>
        <button class="pill-btn"    data-u="km"  onclick="setGlobal('km')">KM</button>
      </div>
    </div>
  </header>

  <!-- TABS -->

  <div class="tabs">
    <button class="tab on" data-m="pace" onclick="setMode('pace')">
      <span class="tab-lbl">Pace</span>
    </button>
    <button class="tab" data-m="time" onclick="setMode('time')">
      <span class="tab-lbl">Finish Time</span>
    </button>
    <button class="tab" data-m="dist" onclick="setMode('dist')">
      <span class="tab-lbl">Distance</span>
    </button>
  </div>

  <!-- PANEL -->

  <div class="panel">
    <div class="igrid">
      <!-- A -->
      <div class="igrp">
        <div class="irow">
          <span class="ilbl" id="lblA">Distance</span>
          <span class="ihint" id="hntA">e.g. 26.2</span>
        </div>
        <div class="field" id="fA"></div>
      </div>
      <!-- divider -->
      <div class="arr">
        <div class="aline at"></div>
        <div class="adiamond">◆</div>
        <div class="aline ab"></div>
      </div>
      <!-- B -->
      <div class="igrp">
        <div class="irow">
          <span class="ilbl" id="lblB">Time</span>
          <span class="ihint" id="hntB">hh : mm : ss</span>
        </div>
        <div class="field" id="fB"></div>
      </div>
    </div>


<div class="cbrow">
  <button class="cb" onclick="calc()">Calculate</button>
</div>
<div class="err" id="err">Please fill in all required fields</div>

<!-- RESULTS -->
<div class="board" id="board">
  <div class="bhdr">
    <div class="bhdrlbl">Result</div>
    <div class="bhdrline"></div>
  </div>
  <div class="bgrid" id="bgrid"></div>
  <div class="splits" id="splits" style="display:none">
    <div class="slbl">Splits</div>
    <table class="stbl">
      <thead>
        <tr>
          <th style="text-align:left">Split</th>
          <th>Distance</th>
          <th>Split Time</th>
          <th>Elapsed</th>
        </tr>
      </thead>
      <tbody id="sbody"></tbody>
    </table>
  </div>
</div>


  </div>


</div><!-- /app -->

<script>
var KPM = 1.60934;

var PRESETS = [
  { lbl: '5K',   km: 5 },
  { lbl: '10K',  km: 10 },
  { lbl: 'Half', km: 21.0975 },
  { lbl: 'Mara', km: 42.195 },
];

var gUnit = 'mi';
var uA    = 'mi';
var uB    = 'mi';
var tA    = 'dist';
var tB    = 'time';
var mode  = 'pace';

/* ── GLOBAL UNIT ── */
function setGlobal(u) {
  gUnit = u;
  var btns = document.querySelectorAll('.pill-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('on', btns[i].getAttribute('data-u') === u);
  }
  renderMode();
  clearResult();
}

/* ── MODE ── */
function setMode(m) {
  mode = m;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('on', tabs[i].getAttribute('data-m') === m);
  }
  renderMode();
  clearResult();
}

function renderMode() {
  if (mode === 'pace') {
    buildA('dist', 'e.g. 26.2', gUnit);
    buildB('time', 'hh : mm : ss', gUnit);
  } else if (mode === 'time') {
    buildA('pace', 'mm:ss / ' + gUnit, gUnit);
    buildB('dist', 'e.g. 26.2', gUnit);
  } else {
    buildA('pace', 'mm:ss / ' + gUnit, gUnit);
    buildB('time', 'hh : mm : ss', gUnit);
  }
}

/* ── BUILD FIELDS ── */
function buildA(type, hint, unit) {
  tA = type; uA = unit;
  document.getElementById('lblA').textContent = cap(type);
  document.getElementById('hntA').textContent = hint;
  buildField('fA', type, unit, 'A');
}
function buildB(type, hint, unit) {
  tB = type; uB = unit;
  document.getElementById('lblB').textContent = cap(type);
  document.getElementById('hntB').textContent = hint;
  buildField('fB', type, unit, 'B');
}

function buildField(id, type, unit, side) {
  var el = document.getElementById(id);
  el.innerHTML = '';
  el.className = 'field';

  var top = mk('div', 'ftop');

  if (type === 'dist') {
    top.appendChild(mkNum(id + '-v', '00.00'));
    top.appendChild(mkUnitToggle(unit, side));
    el.appendChild(top);
    el.appendChild(mkPresets(side, unit));

  } else if (type === 'pace') {
    var row = mk('div', 'trow');
    row.appendChild(mkSeg(id + '-pm', '00', 99));
    row.appendChild(mkColon());
    row.appendChild(mkSeg(id + '-ps', '00', 59));
    top.appendChild(row);
    top.appendChild(mkUnitToggle(unit, side));
    el.appendChild(top);

  } else {
    var row = mk('div', 'trow');
    row.appendChild(mkSeg(id + '-th', '00', 99));
    row.appendChild(mkColon());
    row.appendChild(mkSeg(id + '-tm', '00', 59));
    row.appendChild(mkColon());
    row.appendChild(mkSeg(id + '-ts', '00', 59));
    top.appendChild(row);
    var su = mk('div', 'su');
    su.textContent = 'h:m:s';
    top.appendChild(su);
    el.appendChild(top);
  }
}

function mk(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function mkNum(id, ph) {
  var i = mk('input', 'ni');
  i.id = id;
  i.type = 'number';
  i.min = '0';
  i.step = '0.01';
  i.placeholder = ph;
  i.addEventListener('input', dirty);
  return i;
}

function mkSeg(id, ph, max) {
  var i = mk('input', 'ts');
  i.id = id;
  i.type = 'number';
  i.min = '0';
  i.max = String(max);
  i.placeholder = ph;
  i.addEventListener('input', function() { clamp(i, max); dirty(); });
  return i;
}

function mkColon() {
  var s = mk('span', 'tc');
  s.textContent = ':';
  return s;
}

function mkUnitToggle(active, side) {
  var wrap = mk('div', 'iu');
  wrap.id = 'iu-' + side;
  var units = ['mi', 'km'];
  for (var i = 0; i < units.length; i++) {
    (function(u) {
      var b = mk('button', 'iu-btn' + (u === active ? ' on' : ''));
      b.setAttribute('data-u', u);
      b.textContent = u;
      b.addEventListener('click', function() { flipUnit(side, u); });
      wrap.appendChild(b);
    })(units[i]);
  }
  return wrap;
}

function mkPresets(side, unit) {
  var strip = mk('div', 'pstrip');
  strip.id = 'ps-' + side;
  for (var i = 0; i < PRESETS.length; i++) {
    (function(p) {
      var b = mk('button', 'pchip');
      b.setAttribute('data-km', p.km);
      b.textContent = p.lbl;
      b.addEventListener('click', function() { applyPreset(side, p.km, b); });
      strip.appendChild(b);
    })(PRESETS[i]);
  }
  return strip;
}

/* ── UNIT FLIP ── */
function flipUnit(side, nu) {
  var old  = side === 'A' ? uA : uB;
  var type = side === 'A' ? tA : tB;
  if (nu === old) return;
  if (side === 'A') { uA = nu; } else { uB = nu; }

  var btns = document.querySelectorAll('#iu-' + side + ' .iu-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('on', btns[i].getAttribute('data-u') === nu);
  }

  var fid = 'f' + side;

  if (type === 'dist') {
    var inp = document.getElementById(fid + '-v');
    if (inp && inp.value !== '') {
      var v = parseFloat(inp.value);
      if (!isNaN(v)) inp.value = r2(nu === 'km' ? v * KPM : v / KPM);
    }
    var strip = document.getElementById('ps-' + side);
    if (strip) {
      var chips = strip.querySelectorAll('.pchip');
      for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
    }
  } else if (type === 'pace') {
    var pm = document.getElementById(fid + '-pm');
    var ps = document.getElementById(fid + '-ps');
    if (pm && ps && (pm.value !== '' || ps.value !== '')) {
      var sec = (parseFloat(pm.value) || 0) * 60 + (parseFloat(ps.value) || 0);
      if (sec > 0) {
        var conv = nu === 'km' ? sec / KPM : sec * KPM;
        pm.value = Math.floor(conv / 60);
        ps.value = pad(Math.round(conv % 60));
      }
    }
  }
  dirty();
}

/* ── PRESETS ── */
function applyPreset(side, kmVal, btn) {
  var unit = side === 'A' ? uA : uB;
  var inp  = document.getElementById('f' + side + '-v');
  if (!inp) return;
  inp.value = r2(unit === 'km' ? kmVal : kmVal / KPM);
  var chips = document.getElementById('ps-' + side).querySelectorAll('.pchip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
  btn.classList.add('on');
  dirty();
}

/* ── HELPERS ── */
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function pad(n) { return String(Math.floor(Math.abs(n))).padStart('0', 2); }
function r2(v)  { return Math.round(v * 100) / 100; }
function clamp(el, max) {
  var v = parseInt(el.value, 10);
  if (isNaN(v)) return;
  if (v < 0) el.value = 0;
  if (v > max) el.value = max;
}
function dirty() { clearResult(); }

function gts(hid, mid, sid) {
  var h = document.getElementById(hid);
  var m = document.getElementById(mid);
  var s = document.getElementById(sid);
  return (h ? parseFloat(h.value) || 0 : 0) * 3600
       + (m ? parseFloat(m.value) || 0 : 0) * 60
       + (s ? parseFloat(s.value) || 0 : 0);
}
function gps(pmid, psid) {
  var pm = document.getElementById(pmid);
  var ps = document.getElementById(psid);
  return (pm ? parseFloat(pm.value) || 0 : 0) * 60
       + (ps ? parseFloat(ps.value) || 0 : 0);
}
function ftm(s) {
  s = Math.round(s);
  return zp(Math.floor(s / 3600)) + ':' + zp(Math.floor((s % 3600) / 60)) + ':' + zp(s % 60);
}
function fpc(s) {
  s = Math.round(s);
  return zp(Math.floor(s / 60)) + ':' + zp(s % 60);
}
function zp(n) { return n < 10 ? '0' + n : String(n); }

/* ── CALCULATE ── */
function calc() {
  document.getElementById('err').classList.remove('show');
  var distKm, totalSec, paceKm;

  if (mode === 'pace') {
    var dv = parseFloat((document.getElementById('fA-v') || {}).value);
    totalSec = gts('fB-th', 'fB-tm', 'fB-ts');
    if (!dv || dv <= 0 || totalSec <= 0) return fail();
    distKm = uA === 'km' ? dv : dv * KPM;
    paceKm = totalSec / distKm;

  } else if (mode === 'time') {
    var rawPace = gps('fA-pm', 'fA-ps');
    var dv = parseFloat((document.getElementById('fB-v') || {}).value);
    if (!rawPace || rawPace <= 0 || !dv || dv <= 0) return fail();
    paceKm   = uA === 'km' ? rawPace : rawPace / KPM;
    distKm   = uB === 'km' ? dv : dv * KPM;
    totalSec = paceKm * distKm;

  } else {
    var rawPace = gps('fA-pm', 'fA-ps');
    totalSec = gts('fB-th', 'fB-tm', 'fB-ts');
    if (!rawPace || rawPace <= 0 || totalSec <= 0) return fail();
    paceKm = uA === 'km' ? rawPace : rawPace / KPM;
    distKm = totalSec / paceKm;
  }

  showResult(distKm, totalSec, paceKm);
}

function fail() { document.getElementById('err').classList.add('show'); }

/* ── SHOW RESULT ── */
function showResult(distKm, totalSec, paceKm) {
  var distMi = distKm / KPM;
  var paceMi = paceKm * KPM;
  var spdKmh = 3600 / paceKm;
  var spdMph = 3600 / paceMi;

  var grid = document.getElementById('bgrid');
  grid.innerHTML = '';

  var cells = [
    { lbl: 'Distance',    val: distKm.toFixed(2) + ' km', sub: distMi.toFixed(2) + ' mi' },
    { lbl: 'Finish Time', val: ftm(totalSec),              sub: 'hh:mm:ss' },
    { lbl: 'Pace',        val: fpc(paceKm) + ' /km',       sub: fpc(paceMi) + ' /mi' },
    { lbl: 'Speed',       val: spdKmh.toFixed(2) + ' km/h',sub: spdMph.toFixed(2) + ' mph' },
  ];

  for (var i = 0; i < cells.length; i++) {
    var c    = cells[i];
    var cell = mk('div', 'bcell');
    var lbl  = mk('div', 'bclbl'); lbl.textContent = c.lbl;
    var val  = mk('div', 'bcval'); val.textContent = c.val;
    var sub  = mk('div', 'bcsub'); sub.textContent = c.sub;
    cell.appendChild(lbl);
    cell.appendChild(val);
    cell.appendChild(sub);
    grid.appendChild(cell);
  }

  var tbody   = document.getElementById('sbody');
  var splitsEl = document.getElementById('splits');
  tbody.innerHTML = '';

  var kmFloor = Math.floor(distKm);
  if (kmFloor >= 1) {
    splitsEl.style.display = 'block';
    var elapsed = 0;
    for (var i = 1; i <= kmFloor; i++) {
      elapsed += paceKm;
      var tr = mk('tr', '');
      tr.innerHTML = '<td>KM ' + i + '</td><td>' + i + '.00 km · ' + r2(i / KPM) + ' mi</td><td>' + ftm(paceKm) + '</td><td>' + ftm(elapsed) + '</td>';
      tbody.appendChild(tr);
    }
    var rem = distKm - kmFloor;
    if (rem > 0.005) {
      var remSec = paceKm * rem;
      elapsed += remSec;
      var tr = mk('tr', 'shl');
      tr.innerHTML = '<td>Final ' + rem.toFixed(2) + ' km</td><td>' + distKm.toFixed(2) + ' km · ' + distMi.toFixed(2) + ' mi</td><td>' + ftm(remSec) + '</td><td>' + ftm(elapsed) + '</td>';
      tbody.appendChild(tr);
    }
  } else {
    splitsEl.style.display = 'none';
  }

  var board = document.getElementById('board');
  board.classList.add('vis');
  // double rAF — reliable way to trigger CSS transition after display:block on all browsers
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      board.classList.add('rev');
    });
  });
}

function clearResult() {
  var board = document.getElementById('board');
  board.classList.remove('rev');
  setTimeout(function() { board.classList.remove('vis'); }, 360);
  document.getElementById('err').classList.remove('show');
}

/* ── INIT ── */
renderMode();
</script>
